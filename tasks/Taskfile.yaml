# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

dotenv:
  - ".env"
  - "{{.HOME}}/.env"

includes:
  godot-export:
    taskfile: tasks/export/godot.yaml
    internal: true

  butler-task:
    taskfile: tasks/export/butler.yaml
    internal: true

tasks:
  default:
    cmds:
      - task: edit

  edit:
    requires:
      vars:
        - GODOT

    cmds:
      - "{{.GODOT}} -e --path src/"

  clean:
    cmds:
      - "rm -rf export/"

  build:
    generates:
      - export/*

    sources:
      - src/**/*

    deps:
      - task: godot-export:export
        vars:
          {
            SRC: "src",
            TARGET: "web",
            OUT_DIR: "export/web/",
            OUT_FILE: "index.html",
          }

  publish:
    sources:
      - export/**/*

    deps:
      - task: build

    cmds:
      - task: butler-task:push
        vars:
          {
            SRC: "export/web/",
            GAME: "SmallConfusion/!ADD GAME NAME!",
            CHANNEL: "html",
          }
