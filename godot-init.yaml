# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  godot-init:
    requires:
      vars:
        - GODOT
        - GAME_NAME

    vars:
      FOLDER_NAME: '{{.GAME_NAME | lower | replace " " "_"}}'

    dir: "{{.USER_WORKING_DIR}}/{{.FOLDER_NAME}}"

    cmds:
      - "git clone --depth 1 https://github.com/SmallConfusion/godot-components"
      - defer: "rm -rf godot-components/"

      - "mkdir src"
      - "mv godot-components/godot/* src"

      - 'sed -i src/project.godot -e "s/PLACEHOLDER_NAME/{{.GAME_NAME}}/"'

      - "mv godot-components/tasks/ ."
      - "mv godot-components/gitignore_template .gitignore"
      - "mv tasks/Taskfile.yaml ."

      - 'echo GODOT="{{.GODOT}}" > .env'

      - "{{.GODOT}} -e --path src --headless --quit"

      - "git init"
      - "git add ."
      - 'git commit -m "Initial commit"'

      - silent: true
        cmd: |
          echo "
          Initialized game {{.GAME_NAME}} in {{.FOLDER_NAME}}/.

          Run

          cd {{.FOLDER_NAME}}
          task edit

          to open the editor.
          "
