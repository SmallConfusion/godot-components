# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  godot-init:*:
    requires:
      vars:
        - GODOT

    vars:
      GAME_NAME: "{{index .MATCH 0}}"
      FOLDER_NAME: '{{.GAME_NAME | lower | replace " " "_"}}'

    dir: "{{.USER_WORKING_DIR}}"

    cmds:
      - |
        mkdir {{.FOLDER_NAME}}
        cd {{.FOLDER_NAME}}

        git clone --depth 1 https://github.com/SmallConfusion/godot-components

        mkdir -p src/addons/components
        mv godot-components/godot/* src/addons/components/
        mv godot-components/tasks/ .
        mv godot-components/gitignore_template .gitignore
        mv tasks/Taskfile.yaml .

        rm -rf godot-components/
        rm -f src/components/project.godot

        curl https://godotengine.org/assets/press/icon_color.svg -o src/icon.svg

        echo '
        config_version=5
        [application]
        config/name="{{.GAME_NAME}}"
        ' > src/project.godot

        echo GODOT="{{.GODOT}}" > .env
        echo .godot/ > src/.gitignore

        git init
        git add .
        git commit -m "Initial commit"

      - silent: true
        cmd: |
          echo "
          Initialized game {{.GAME_NAME}} in {{.FOLDER_NAME}}/.

          Run

          cd {{.FOLDER_NAME}}
          task edit

          to open the editor.
          "
